<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup DNI - Educational Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="disclaimer">
        ⚠️ EDUCATIONAL MOCKUP ONLY - NOT A VALID DOCUMENT
    </div>

    <div class="dni-card" id="dniCard">
        <!-- Header -->
        <div class="dni-header">
            <div class="logo-placeholder">[LOGO]</div>
            <div class="title">DOCUMENTO NACIONAL DE IDENTIDAD</div>
            <div class="sub-title">REPUBLICA ARGENTINA - MERCOSUR</div>
        </div>

        <!-- Main Content Grid -->
        <div class="dni-body">
            <!-- Left Side: Photo & Data -->
            <div class="left-column">
                <div class="photo-placeholder" contenteditable="true">
                    [FOTO]
                </div>
                <div class="data-grid">
                    <div class="field">
                        <span class="label">Apellido:</span>
                        <span class="value" contenteditable="true">ALVAREZ PEÑAS</span>
                    </div>
                    <div class="field">
                        <span class="label">Nombre:</span>
                        <span class="value" contenteditable="true">Mariano Ismael</span>
                    </div>
                    <div class="field">
                        <span class="label">Sexo:</span>
                        <span class="value" contenteditable="true">M</span>
                    </div>
                    <div class="field">
                        <span class="label">Nacionalidad:</span>
                        <span class="value" contenteditable="true">ARGENTINA</span>
                    </div>
                    <div class="field">
                        <span class="label">Fecha Nac.:</span>
                        <span class="value" contenteditable="true">08 OCT 2007</span>
                    </div>
                </div>
            </div>

            <!-- Right Side: Numbers & Expiry -->
            <div class="right-column">
                <div class="document-number" contenteditable="true">48.397.964</div>
                <div class="expiry-date">
                    <span>Fecha de expiración:</span>
                    <span contenteditable="true">22 ABR 2036</span>
                </div>
                <div class="qr-placeholder">[QR CODE]</div>
            </div>
        </div>

        <!-- Footer / Background Pattern Simulation -->
        <div class="dni-footer">
            <div class="signature-area" contenteditable="true">[FIRMA]</div>
            <div class="background-pattern"></div>
        </div>
    </div>

    <div class="controls">
        <button onclick="exportMockup()">Exportar como Imagen (Mockup)</button>
        <button onclick="resetFields()">Resetear Campos</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
